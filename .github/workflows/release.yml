# 发包出仓:打 v* tag 自动创建 GitHub Release(自动生成 changelog + 附构建产物)
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: 打包构建产物
        run: cd web/dist && zip -r "../../above-the-wind-${GITHUB_REF_NAME}-dist.zip" .
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "above-the-wind-${GITHUB_REF_NAME}-dist.zip"
