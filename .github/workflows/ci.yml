# CI 门禁:PR 与 main push 必过 lint + 类型检查 + 构建(机器能查的不留给人查)
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: 前端 lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build # tsc -b && vite build,类型错误即红

  harvest:
    name: 采集脚本语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall harvest/
